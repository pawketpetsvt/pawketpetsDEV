<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PawketPetsVT — OBS Overlay</title>
<link href="https://fonts.googleapis.com/css2?family=Chewy&display=swap" rel="stylesheet">
<style>
  /* Transparent, click-through overlay meant for an OBS Browser Source. */
  html, body {
    margin: 0; padding: 0;
    width: 100vw; height: 100vh;
    background: transparent;
    overflow: hidden;
    font-family: 'Segoe UI', Arial, sans-serif;
    pointer-events: none; /* never blocks stream interaction */
  }

  :root {
    --purple: #9966ff;
    --purple-light: #ccaaff;
    --purple-dark: #6633cc;
    --pink: #ff66cc;
  }

  /* ── Single top-left column — all widgets stack top-down here instead
     of being scattered around the screen, so they only ever occupy one
     corner rather than covering gameplay elsewhere. ── */
  #obs-stack {
    position: fixed;
    top: 24px;
    left: 24px;
    width: 300px;
    display: flex;
    flex-direction: column;
  }

  /* Each widget is wrapped in a collapsible slot so hidden widgets take
     up zero space (no gaps left in the stack) and visible ones unfold
     in smoothly rather than snapping in/out. */
  .obs-item {
    overflow: hidden;
    max-height: 0;
    opacity: 0;
    margin-bottom: 0;
    transition: max-height 0.5s ease, opacity 0.4s ease, margin-bottom 0.5s ease;
  }
  .obs-item.expanded {
    max-height: 500px;
    opacity: 1;
    margin-bottom: 14px;
  }

  .obs-card {
    background: rgba(20, 10, 35, 0.82);
    border: 2px solid var(--purple);
    border-radius: 14px;
    color: #fff;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
  }

  /* ── Persistent stats card ── */
  #stats-overlay { padding: 14px 16px; }
  .stats-header { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .stats-pet-img { width: 44px; height: 44px; border-radius: 10px; object-fit: cover; background: rgba(255,255,255,0.1); flex-shrink: 0; }
  .stats-name-block { flex: 1; min-width: 0; }
  .stats-name { font-weight: bold; font-size: 1.05rem; }
  .stats-sub { font-size: 0.78rem; color: #d8c8ff; }
  .stats-brand-text {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    line-height: 0.85;
    flex-shrink: 0;
    text-align: center;
    padding: 0 4px;
  }
  .stats-brand-line {
    font-family: 'Chewy', cursive;
    font-size: 1.3rem;
    letter-spacing: 0.02em;
    background: linear-gradient(135deg, var(--pink), var(--purple-light));
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    color: var(--pink); /* fallback if background-clip:text isn't supported */
    text-shadow: 0 2px 3px rgba(0,0,0,0.35);
  }
  .stat-row { display: flex; align-items: center; gap: 6px; margin-top: 5px; font-size: 0.78rem; }
  .stat-label { width: 56px; flex-shrink: 0; }
  .stat-bar-track { flex: 1; height: 8px; background: rgba(255,255,255,0.12); border-radius: 6px; overflow: hidden; }
  .stat-bar-fill { height: 100%; border-radius: 6px; transition: width 0.4s ease; }
  .stat-fill-hp        { background: linear-gradient(90deg,#ff5566,#ff8899); }
  .stat-fill-hunger    { background: linear-gradient(90deg,#ffaa33,#ffcc66); }
  .stat-fill-energy    { background: linear-gradient(90deg,#33ccff,#66ddff); }
  .stat-fill-happiness { background: linear-gradient(90deg,#66dd88,#99eeaa); }
  .stats-tip { margin-top: 8px; font-size: 0.75rem; font-style: italic; color: #ffd9a0; }

  /* ── Community goal card ── */
  #goal-overlay { padding: 12px 18px; border-color: var(--purple); }
  .goal-badge { font-size: 0.65rem; font-weight: bold; letter-spacing: 0.05em; color: var(--pink); margin-bottom: 4px; }
  .goal-title { font-size: 0.85rem; font-weight: bold; margin-bottom: 6px; }
  .goal-desc { font-size: 0.72rem; color: #e8ddff; margin-bottom: 8px; line-height: 1.3; }
  .goal-bar-track { height: 14px; background: rgba(255,255,255,0.12); border-radius: 8px; overflow: hidden; }
  .goal-bar-fill { height: 100%; background: linear-gradient(90deg, var(--purple), var(--pink)); border-radius: 8px; transition: width 0.5s ease; }
  .goal-text { font-size: 0.72rem; margin-top: 4px; color: #d8c8ff; }

  /* ── Live activity ticker — persistent, always visible, cycles slowly
     through recent events across the whole game (not just this stream) ── */
  #activity-ticker {
    padding: 12px 16px;
    border-color: var(--purple);
    min-height: 18px;
  }
  .ticker-label { font-size: 0.62rem; font-weight: bold; letter-spacing: 0.06em; text-transform: uppercase; color: var(--purple-light); margin-bottom: 5px; }
  .ticker-text { font-size: 0.85rem; line-height: 1.4; color: #fff; transition: opacity 0.35s ease; }

  /* ── Chat-triggered pet pop-up ── */
  #chat-pop {
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    border-color: var(--pink);
  }
  #chat-pop img { width: 40px; height: 40px; border-radius: 8px; object-fit: cover; }
  #chat-pop .chat-pop-text { font-size: 0.85rem; }
  #chat-pop .chat-pop-viewer { font-weight: bold; color: var(--pink); }
</style>
</head>
<body>

  <div id="obs-stack">

    <div id="stats-wrap" class="obs-item">
      <div id="stats-overlay" class="obs-card">
        <div class="stats-header">
          <img id="stats-pet-img" class="stats-pet-img" src="" alt="">
          <div class="stats-name-block">
            <div id="stats-name" class="stats-name">—</div>
            <div id="stats-sub" class="stats-sub">—</div>
          </div>
          <div class="stats-brand-text">
            <span class="stats-brand-line">Pawket</span>
            <span class="stats-brand-line">Pets</span>
          </div>
        </div>
        <div class="stat-row"><span class="stat-label">HP</span><div class="stat-bar-track"><div id="bar-hp" class="stat-bar-fill stat-fill-hp" style="width:0%"></div></div></div>
        <div class="stat-row"><span class="stat-label">Hunger</span><div class="stat-bar-track"><div id="bar-hunger" class="stat-bar-fill stat-fill-hunger" style="width:0%"></div></div></div>
        <div class="stat-row"><span class="stat-label">Energy</span><div class="stat-bar-track"><div id="bar-energy" class="stat-bar-fill stat-fill-energy" style="width:0%"></div></div></div>
        <div class="stat-row"><span class="stat-label">Happy</span><div class="stat-bar-track"><div id="bar-happiness" class="stat-bar-fill stat-fill-happiness" style="width:0%"></div></div></div>
        <div id="stats-tip" class="stats-tip"></div>
      </div>
    </div>

    <div id="goal-wrap" class="obs-item">
      <div id="goal-overlay" class="obs-card">
        <div class="goal-badge">🌍 COMMUNITY GOAL</div>
        <div id="goal-title" class="goal-title">—</div>
        <div id="goal-desc" class="goal-desc">—</div>
        <div class="goal-bar-track"><div id="goal-bar" class="goal-bar-fill" style="width:0%"></div></div>
        <div id="goal-text" class="goal-text">—</div>
      </div>
    </div>

    <div id="ticker-wrap" class="obs-item">
      <div id="activity-ticker" class="obs-card" style="margin-bottom:0;">
        <div class="ticker-label">🌍 Live Activity</div>
        <div id="ticker-text" class="ticker-text">👀 Watching for adventures...</div>
      </div>
    </div>

    <div id="chatpop-wrap" class="obs-item">
      <div id="chat-pop" class="obs-card">
        <img id="chat-pop-img" src="" alt="">
        <div class="chat-pop-text"><span id="chat-pop-viewer" class="chat-pop-viewer"></span>'s <span id="chat-pop-pet"></span> says hi! 👋</div>
      </div>
    </div>

  </div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.38.4"></script>
<script>
(function() {
  var SUPABASE_URL = 'https://hqzugbxutgefjilgmxqu.supabase.co';
  var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhxenVnYnh1dGdlZmppbGdteHF1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5MTE5NjEsImV4cCI6MjA5MDQ4Nzk2MX0.A3bQMriwY8j9GasUywq_8hKlnkEQQNMyB2ykSaQR68c';
  var supa = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  var params = new URLSearchParams(window.location.search);
  var streamerLogin = params.get('streamer') || '';

  function expand(wrapId) { document.getElementById(wrapId).classList.add('expanded'); }
  function collapse(wrapId) { document.getElementById(wrapId).classList.remove('expanded'); }

  // ══════════════════════════════════════════════════════════════
  // 1. PERSISTENT STATS OVERLAY
  // Uses the Worker's existing /api/overlay endpoint (already live,
  // already using the service key server-side) rather than querying
  // Supabase directly — simpler and no RLS changes needed.
  // NOTE: ?streamer= must match the player's in-game username (the
  // Worker's /api/overlay matches on players.username), which may not
  // be identical to their Twitch login used elsewhere for landing pages.
  // ══════════════════════════════════════════════════════════════
  var WORKER_URL = 'https://pawketpets-twitch.pawketpetsvt.workers.dev';

  async function loadStats() {
    if (!streamerLogin) return;
    try {
      var res = await fetch(WORKER_URL + '/api/overlay?streamer=' + encodeURIComponent(streamerLogin));
      var json = await res.json();
      if (!json.success || !json.pet) return;

      var pet = json.pet;
      document.getElementById('stats-name').textContent = pet.name || 'Pet';
      document.getElementById('stats-sub').textContent = 'Lv. ' + (pet.level || 1) + ' ' + (pet.species || '');
      if (pet.image) document.getElementById('stats-pet-img').src = pet.image;

      document.getElementById('bar-hp').style.width = (pet.stats.hp.percent || 0) + '%';
      document.getElementById('bar-hunger').style.width = (pet.stats.hunger.percent || 0) + '%';
      document.getElementById('bar-energy').style.width = (pet.stats.energy.percent || 0) + '%';
      document.getElementById('bar-happiness').style.width = (pet.stats.happiness.percent || 0) + '%';

      var hungerPct = pet.stats.hunger.percent || 0;
      var energyPct = pet.stats.energy.percent || 0;
      var happinessPct = pet.stats.happiness.percent || 0;
      var tip = hungerPct < 30 ? '🍽️ Hungry! Feed me in the game!' :
                energyPct < 30 ? '😴 Tired! Let me rest...' :
                happinessPct < 40 ? '💔 Sad! Play with me in the game!' :
                '✨ Happy and healthy! Thanks for watching!';
      document.getElementById('stats-tip').textContent = tip;

      statsHasData = true;
      if (!foldedNow) expand('stats-wrap');
    } catch (e) {
      console.error('[OBS] stats load error', e);
    }
  }
  var statsHasData = false;
  loadStats();
  setInterval(loadStats, 60000);

  // ══════════════════════════════════════════════════════════════
  // 2. LIVE ACTIVITY TICKER — always on screen, cycles slowly through
  // recent events across the whole game (not just this stream): pet
  // adoptions (with nickname if given), fainted pets, boss kills, level
  // ups, badges, achievements. Keeps a small rolling queue rather than
  // popping up and disappearing, so there's always something to read.
  // ══════════════════════════════════════════════════════════════
  var TICKER_QUEUE_MAX = 15;
  var TICKER_ROTATE_MS = 6000;  // how long each message stays up before advancing
  var TICKER_IDLE_MS = 15000;   // revert to the idle message if nothing new happens for this long
  var tickerQueue = [];
  var tickerIndex = 0;
  var tickerIdleTimer = null;

  function buildTickerMessage(row) {
    var data = row.activity_data || {};
    var user = data.username || 'Someone';
    switch (row.activity_type) {
      case 'pet_adopted': {
        var species = data.species || data.pet_name || 'a pet';
        var nickname = data.nickname;
        return { icon: '🐾', color: '#ff88d9', text: user + ' adopted a ' + species + (nickname ? ' and named it ' + nickname + '!' : '!') };
      }
      case 'pet_fainted':
        return { icon: '😢', color: '#aab4c8', text: (data.pet_name || (user + "'s pet")) + ' was defeated in battle against ' + (data.enemy || 'an enemy') + '...' };
      case 'boss_defeated':
        return { icon: '💀', color: '#ff8866', text: user + ' defeated ' + (data.boss_name || 'a boss') + '!' };
      case 'level_up':
        return { icon: '🎉', color: '#ffd966', text: (data.pet_name || (user + "'s pet")) + ' just hit level ' + (data.level || '?') + '!' };
      case 'badge_earned':
        return { icon: '🎖️', color: '#c299ff', text: user + ' just earned the ' + (data.badge_name || 'a badge') + ' badge!' };
      case 'achievement_unlocked':
        return { icon: '⭐', color: '#66ddff', text: user + ' unlocked ' + (data.achievement_name || 'an achievement') + '!' };
      default: return null; // unrecognized types don't show in the ticker
    }
  }

  function renderTicker() {
    var textEl = document.getElementById('ticker-text');
    if (!tickerQueue.length) {
      textEl.style.opacity = '0';
      setTimeout(function() {
        textEl.textContent = '👀 Watching for adventures...';
        textEl.style.color = '#fff';
        textEl.style.opacity = '1';
      }, 200);
      return;
    }
    var item = tickerQueue[tickerIndex % tickerQueue.length];
    textEl.style.opacity = '0';
    setTimeout(function() {
      textEl.textContent = item.icon + ' ' + item.text;
      textEl.style.color = item.color;
      textEl.style.opacity = '1';
    }, 200);
  }

  function addToTicker(msg) {
    tickerQueue.unshift(msg);
    if (tickerQueue.length > TICKER_QUEUE_MAX) tickerQueue.length = TICKER_QUEUE_MAX;
    tickerIndex = 0; // show the newest item next
    renderTicker();

    // Reset the "gone quiet" timer — if nothing new shows up for a while,
    // stop cycling through old history and just go back to idle.
    if (tickerIdleTimer) clearTimeout(tickerIdleTimer);
    tickerIdleTimer = setTimeout(function() {
      tickerQueue = [];
      renderTicker();
    }, TICKER_IDLE_MS);
  }

  renderTicker(); // show the idle message right away on load
  setInterval(function() {
    if (tickerQueue.length > 1) {
      tickerIndex = (tickerIndex + 1) % tickerQueue.length;
      renderTicker();
    }
  }, TICKER_ROTATE_MS);

  supa
    .channel('obs-activity-feed')
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'activity_feed' }, function(payload) {
      console.log('[OBS] activity_feed event received:', payload);
      var row = payload.new;
      if (!row.is_public) { console.log('[OBS] skipped — is_public is false'); return; }
      var msg = buildTickerMessage(row);
      if (!msg) { console.log('[OBS] skipped — unrecognized activity_type:', row.activity_type); return; }
      addToTicker(msg);
    })
    .subscribe(function(status, err) {
      console.log('[OBS] activity_feed channel status:', status, err || '');
    });

  // ══════════════════════════════════════════════════════════════
  // 3. COMMUNITY GOAL PROGRESS OVERLAY — cycles through active goals
  // ══════════════════════════════════════════════════════════════
  var goalList = [];
  var goalIndex = 0;

  async function loadGoals() {
    try {
      var nowIso = new Date().toISOString();
      var { data } = await supa
        .from('community_goals')
        .select('*')
        .eq('is_active', true)
        .eq('is_completed', false)
        .lte('started_at', nowIso)
        .or('ends_at.is.null,ends_at.gte.' + nowIso);
      goalList = data || [];
      renderGoal();
    } catch (e) {
      console.error('[OBS] goal load error', e);
    }
  }

  function renderGoal() {
    if (!goalList.length) { goalHasData = false; collapse('goal-wrap'); return; }
    var goal = goalList[goalIndex % goalList.length];
    var progress = goal.current_progress || 0;
    var pct = Math.min(100, (progress / goal.goal_target) * 100);
    document.getElementById('goal-title').textContent = '📖 ' + goal.title;
    document.getElementById('goal-desc').textContent = goal.description || '';
    document.getElementById('goal-bar').style.width = pct + '%';
    document.getElementById('goal-text').textContent = progress.toLocaleString() + ' / ' + goal.goal_target.toLocaleString() + ' (' + Math.round(pct) + '%)';
    goalHasData = true;
    if (!foldedNow) expand('goal-wrap');
  }
  var goalHasData = false;

  loadGoals();
  setInterval(loadGoals, 60000);
  // Cycle to the next goal every 60s if more than one is active
  setInterval(function() {
    if (goalList.length > 1) { goalIndex++; renderGoal(); }
  }, 60000);

  // ══════════════════════════════════════════════════════════════
  // FOLD/UNFOLD CYCLE — the two persistent panels (stats + goal) don't
  // stay on screen forever; they unfold into view, sit for a while, then
  // fold back away so they're not permanently covering stream content.
  // Tweak the two constants below to adjust timing.
  // ══════════════════════════════════════════════════════════════
  var FOLD_VISIBLE_MS = 150000; // 2.5 minutes visible
  var FOLD_HIDDEN_MS = 300000;  // 5 minutes hidden
  var foldedNow = false;

  function runFoldCycle(visible) {
    foldedNow = !visible;
    if (visible) {
      if (statsHasData) expand('stats-wrap');
      if (goalHasData) expand('goal-wrap');
      expand('ticker-wrap'); // always has something to show (idle message if nothing else)
    } else {
      collapse('stats-wrap');
      collapse('goal-wrap');
      collapse('ticker-wrap');
    }
    setTimeout(function() { runFoldCycle(!visible); }, visible ? FOLD_VISIBLE_MS : FOLD_HIDDEN_MS);
  }
  runFoldCycle(true); // start visible

  // ══════════════════════════════════════════════════════════════
  // 4. CHAT-TRIGGERED PET POP-UP — realtime subscription on
  // chat_pet_triggers, filtered to this streamer. Requires the Worker
  // to insert a row here on chat messages (already wired in on the
  // Worker side) — this page only handles the receiving/display side.
  // ══════════════════════════════════════════════════════════════
  function showChatPop(row) {
    document.getElementById('chat-pop-viewer').textContent = row.viewer_username;
    document.getElementById('chat-pop-pet').textContent = row.pet_name || 'pet';
    document.getElementById('chat-pop-img').src = row.pet_image || '';
    expand('chatpop-wrap');
    setTimeout(function() { collapse('chatpop-wrap'); }, 5000);
  }

  if (streamerLogin) {
    supa
      .channel('obs-chat-triggers')
      .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'chat_pet_triggers' }, function(payload) {
        console.log('[OBS] chat_pet_triggers event received:', payload);
        var row = payload.new;
        if ((row.streamer_login || '').toLowerCase() === streamerLogin.toLowerCase()) {
          showChatPop(row);
        } else {
          console.log('[OBS] skipped — streamer_login mismatch:', row.streamer_login, 'vs', streamerLogin);
        }
      })
      .subscribe(function(status, err) {
        console.log('[OBS] chat_pet_triggers channel status:', status, err || '');
      });
  }
})();
</script>
</body>
</html>
